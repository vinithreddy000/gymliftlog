<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LIFTLOG</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080b0f;
  --bg2: #0f1318;
  --bg3: #161c24;
  --bg4: #1d252f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e8edf2;
  --text2: #7a8896;
  --text3: #3d4f5e;
  --accent: #00e5ff;
  --accent2: #00b8cc;
  --green: #39ff6a;
  --red: #ff3b55;
  --orange: #ff8c00;
  --purple: #b47aff;
  --yellow: #ffe033;

  /* muscle colors */
  --chest-c: #ff5277;
  --back-c: #00b4ff;
  --shoulders-c: #ffa722;
  --biceps-c: #39ff6a;
  --triceps-c: #b47aff;
  --legs-c: #ff6b35;
  --abs-c: #ffdd00;
  --cardio-c: #00e5ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 12px;
  -webkit-tap-highlight-color: transparent;
}

.app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }

/* ── HEADER ─────────────────────────────────────────────── */
.header {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,229,255,0.4);
}
.logo span { color: var(--text3); }
.header-right { display: flex; align-items: center; gap: 10px; }
.date-tag { font-size: 10px; color: var(--text2); letter-spacing: 1px; }
.sync-badge {
  font-size: 9px;
  letter-spacing: 1px;
  border-radius: 4px;
  padding: 2px 6px;
  font-weight: 700;
}
.sync-badge.online { color: #39ff6a; background: rgba(57,255,106,0.1); border: 1px solid rgba(57,255,106,0.3); }
.sync-badge.error { color: #ff3b55; background: rgba(255,59,85,0.1); border: 1px solid rgba(255,59,85,0.3); }
.sync-badge.offline { color: #7a8896; background: rgba(122,136,150,0.1); border: 1px solid rgba(122,136,150,0.2); }
.streak-badge {
  font-size: 10px;
  color: var(--orange);
  background: rgba(255,140,0,0.1);
  border: 1px solid rgba(255,140,0,0.25);
  border-radius: 4px;
  padding: 2px 7px;
  letter-spacing: 1px;
  font-weight: 700;
}

/* ── NAV ─────────────────────────────────────────────────── */
.nav {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 44px;
  z-index: 49;
}
.nav-btn {
  flex: 1;
  padding: 10px 4px;
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  text-transform: uppercase;
}
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-btn:hover:not(.active) { color: var(--text); }

/* ── PAGES ─────────────────────────────────────────────────── */
.page { display: none; padding: 14px 14px 80px; }
.page.active { display: block; }

/* ── SECTION LABELS ──────────────────────────────────────── */
.section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label:first-child { margin-top: 0; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── TIME BLOCKS ─────────────────────────────────────────── */
.time-display-row { display: flex; gap: 8px; margin-bottom: 8px; }
.time-block {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  transition: border-color 0.2s;
}
.time-block.has-time { border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.04); }
.time-block-label { font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; }
.time-block-value { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 2px; font-variant-numeric: tabular-nums; }
.time-block-value.empty { color: var(--text3); font-size: 14px; font-weight: 400; }
.time-tap-btn {
  background: none;
  border: 1px dashed var(--border2);
  border-radius: 5px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  cursor: pointer;
  padding: 3px 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.15s;
  margin-top: 2px;
}
.time-tap-btn:hover { color: var(--accent); border-color: var(--accent); }
.time-tap-btn.set { color: var(--green); border-color: rgba(57,255,106,0.3); border-style: solid; cursor: default; }
.duration-badge {
  text-align: center;
  margin-bottom: 8px;
  font-size: 11px;
  color: var(--text2);
  letter-spacing: 1px;
}
.duration-badge span { color: var(--accent); font-weight: 700; font-size: 14px; }

/* ── WARMUP ROW ──────────────────────────────────────────── */
.warmup-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.warmup-row label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.warmup-row input {
  width: 70px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 6px 8px;
  border-radius: 6px;
  text-align: center;
}
.warmup-row input:focus { outline: none; border-color: var(--accent); }

/* ── MUSCLE GRID ─────────────────────────────────────────── */
.muscle-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.muscle-chip {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.muscle-chip:hover { border-color: var(--border2); color: var(--text); }
.muscle-chip.selected { font-weight: 700; }
/* Per-muscle colors */
.muscle-chip[data-m="Chest"].selected { background: rgba(255,82,119,0.15); border-color: rgba(255,82,119,0.6); color: var(--chest-c); }
.muscle-chip[data-m="Back"].selected { background: rgba(0,180,255,0.15); border-color: rgba(0,180,255,0.6); color: var(--back-c); }
.muscle-chip[data-m="Shoulders"].selected { background: rgba(255,167,34,0.15); border-color: rgba(255,167,34,0.6); color: var(--shoulders-c); }
.muscle-chip[data-m="Biceps"].selected { background: rgba(57,255,106,0.12); border-color: rgba(57,255,106,0.5); color: var(--biceps-c); }
.muscle-chip[data-m="Triceps"].selected { background: rgba(180,122,255,0.15); border-color: rgba(180,122,255,0.5); color: var(--triceps-c); }
.muscle-chip[data-m="Legs"].selected { background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.5); color: var(--legs-c); }
.muscle-chip[data-m="Abs"].selected { background: rgba(255,221,0,0.1); border-color: rgba(255,221,0,0.4); color: var(--abs-c); }
.muscle-chip[data-m="Cardio"].selected { background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.4); color: var(--cardio-c); }

/* ── LAST SESSION BANNER ─────────────────────────────────── */
.last-workout-banner {
  background: rgba(0,229,255,0.04);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 10px;
}
.lwb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.lwb-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-weight: 700; }
.lwb-date { font-size: 10px; color: var(--text2); }
.lwb-exercises { display: flex; flex-wrap: wrap; gap: 4px; }
.lwb-ex-pill {
  font-size: 10px;
  background: rgba(0,229,255,0.07);
  color: var(--text2);
  padding: 2px 8px;
  border-radius: 4px;
  border: 1px solid rgba(0,229,255,0.15);
}
.load-last-btn {
  width: 100%;
  margin-top: 8px;
  padding: 8px;
  background: rgba(0,229,255,0.08);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 6px;
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.15s;
}
.load-last-btn:hover { background: rgba(0,229,255,0.15); }

/* ── EXERCISE CARDS ──────────────────────────────────────── */
.exercise-list { margin-top: 4px; }

.ex-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  transition: border-color 0.2s;
  position: relative;
}
.ex-card:hover { border-color: var(--border2); }

.ex-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  gap: 6px;
}
.ex-header-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; flex-wrap: wrap; }
.ex-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 170px;
}
.loaded-badge {
  display: inline-block;
  font-size: 8px;
  font-family: 'JetBrains Mono', monospace;
  background: rgba(0,229,255,0.1);
  color: var(--accent);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 3px;
  padding: 1px 5px;
  letter-spacing: 1px;
  vertical-align: middle;
  flex-shrink: 0;
}

/* Muscle tag on exercise card */
.ex-muscle-tag {
  display: inline-block;
  font-size: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 3px;
  flex-shrink: 0;
}
.ex-muscle-tag.Chest { background: rgba(255,82,119,0.15); border: 1px solid rgba(255,82,119,0.4); color: var(--chest-c); }
.ex-muscle-tag.Back { background: rgba(0,180,255,0.15); border: 1px solid rgba(0,180,255,0.4); color: var(--back-c); }
.ex-muscle-tag.Shoulders { background: rgba(255,167,34,0.15); border: 1px solid rgba(255,167,34,0.4); color: var(--shoulders-c); }
.ex-muscle-tag.Biceps { background: rgba(57,255,106,0.12); border: 1px solid rgba(57,255,106,0.35); color: var(--biceps-c); }
.ex-muscle-tag.Triceps { background: rgba(180,122,255,0.15); border: 1px solid rgba(180,122,255,0.35); color: var(--triceps-c); }
.ex-muscle-tag.Legs { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.35); color: var(--legs-c); }
.ex-muscle-tag.Abs { background: rgba(255,221,0,0.1); border: 1px solid rgba(255,221,0,0.3); color: var(--abs-c); }
.ex-muscle-tag.Cardio { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); color: var(--cardio-c); }
.ex-muscle-tag.Mixed { background: rgba(180,122,255,0.1); border: 1px solid rgba(180,122,255,0.3); color: var(--purple); }

.ex-header-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

/* Inline SWAP button on exercise card */
.inline-swap-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 3px 8px;
  background: rgba(255,140,0,0.1);
  border: 1px solid rgba(255,140,0,0.35);
  border-radius: 4px;
  color: var(--orange);
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.inline-swap-btn:hover { background: rgba(255,140,0,0.2); }

.del-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  padding: 0 4px;
  flex-shrink: 0;
}
.del-btn:hover { color: var(--red); }

/* ── SETS TABLE ──────────────────────────────────────────── */
.sets-table { width: 100%; border-collapse: collapse; }
.sets-table th {
  font-size: 9px;
  color: var(--text3);
  text-align: left;
  padding: 2px 4px 6px;
  letter-spacing: 1.5px;
  font-weight: 400;
  text-transform: uppercase;
}
.sets-table td { padding: 3px 4px; }
.sets-table input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 5px 6px;
  border-radius: 5px;
  text-align: center;
  transition: border-color 0.15s;
}
.sets-table input:focus { outline: none; border-color: var(--accent); }
.set-vol { font-size: 10px; color: var(--text3); text-align: center; padding: 3px 2px; min-width: 34px; }
.add-set-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text2);
  background: none;
  border: 1px dashed var(--border2);
  width: 100%;
  padding: 6px;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 6px;
  transition: all 0.15s;
  letter-spacing: 0.5px;
}
.add-set-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── PR INLINE INDICATOR ─────────────────────────────────── */
.pr-indicator {
  font-size: 9px;
  color: var(--yellow);
  background: rgba(255,224,51,0.08);
  border: 1px solid rgba(255,224,51,0.25);
  border-radius: 3px;
  padding: 1px 4px;
  letter-spacing: 1px;
  white-space: nowrap;
}

/* ── ADD EXERCISE ROW ─────────────────────────────────────── */
.add-ex-row { display: flex; gap: 8px; margin-top: 8px; }
.add-ex-row input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 9px 11px;
  border-radius: 7px;
}
.add-ex-row input:focus { outline: none; border-color: var(--accent); }
input::placeholder { color: var(--text3); }

/* ── BUTTONS ──────────────────────────────────────────────── */
.btn {
  padding: 9px 14px;
  border-radius: 7px;
  border: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #00ccee; box-shadow: 0 0 18px rgba(0,229,255,0.3); }
.btn-ghost { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { color: var(--text); border-color: var(--text2); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-danger { background: rgba(255,59,85,0.1); border: 1px solid rgba(255,59,85,0.3); color: var(--red); }
.btn-danger:hover { background: rgba(255,59,85,0.2); }

.save-row { display: flex; gap: 8px; margin-top: 16px; }
.save-row .btn { flex: 1; padding: 13px; font-size: 14px; letter-spacing: 3px; }
.notes-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 10px 11px;
  border-radius: 7px;
  resize: vertical;
  min-height: 60px;
  line-height: 1.5;
}
.notes-input:focus { outline: none; border-color: var(--accent); }

/* ── HISTORY ──────────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 5px 11px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  cursor: pointer;
  white-space: nowrap;
  text-transform: uppercase;
  transition: all 0.15s;
}
.filter-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
.filter-chip:hover:not(.active) { border-color: var(--border2); color: var(--text); }

.workout-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.workout-item:hover { border-color: var(--border2); border-left-color: var(--accent); background: var(--bg4); }
.workout-item-header { display: flex; justify-content: space-between; align-items: flex-start; }
.workout-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.5px;
}
.workout-duration { font-size: 10px; color: var(--text2); letter-spacing: 1px; }
.workout-muscles { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.muscle-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 3px;
}
.muscle-tag.Chest { background: rgba(255,82,119,0.12); color: var(--chest-c); border: 1px solid rgba(255,82,119,0.3); }
.muscle-tag.Back { background: rgba(0,180,255,0.12); color: var(--back-c); border: 1px solid rgba(0,180,255,0.3); }
.muscle-tag.Shoulders { background: rgba(255,167,34,0.12); color: var(--shoulders-c); border: 1px solid rgba(255,167,34,0.3); }
.muscle-tag.Biceps { background: rgba(57,255,106,0.1); color: var(--biceps-c); border: 1px solid rgba(57,255,106,0.25); }
.muscle-tag.Triceps { background: rgba(180,122,255,0.12); color: var(--triceps-c); border: 1px solid rgba(180,122,255,0.3); }
.muscle-tag.Legs { background: rgba(255,107,53,0.12); color: var(--legs-c); border: 1px solid rgba(255,107,53,0.3); }
.muscle-tag.Abs { background: rgba(255,221,0,0.08); color: var(--abs-c); border: 1px solid rgba(255,221,0,0.25); }
.muscle-tag.Cardio { background: rgba(0,229,255,0.08); color: var(--cardio-c); border: 1px solid rgba(0,229,255,0.25); }

.workout-stats { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.stat-mini { font-size: 10px; color: var(--text2); }
.stat-mini span { color: var(--text); font-weight: 700; }

/* ── WORKOUT DETAIL ───────────────────────────────────────── */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--text2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  margin-bottom: 14px;
  padding: 0;
}
.back-btn:hover { color: var(--accent); }
.workout-detail {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.detail-ex-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-sets { font-size: 11px; color: var(--text2); padding: 2px 0; }
.detail-sets span { color: var(--text); font-weight: 700; }

/* ── PRs ──────────────────────────────────────────────────── */
.pr-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;

const FETCH_OPTS = { mode: 'cors', credentials: 'omit' };

async function dbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, { ...FETCH_OPTS, ...opts, headers: { ...DB_HEADERS, ...(opts.headers||{}) } });
  if (!res.ok) {
    const t = await res.text();
    let msg;
    try { const j = JSON.parse(t); msg = j.message || j.error || t; } catch { msg = t; }
    throw new Error('HTTP ' + res.status + ': ' + msg);
  }
  return res;
}

async function dbUpsert(rows) {
  if (!rows.length) return;

  await dbFetch('/rest/v1/workouts?workout_date=in.(' + dateList + ')', { method: 'DELETE' });
  await dbFetch('/rest/v1/workouts', {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify(rows)
  });
}

async function dbDelete(workout_date) {

}

async function dbPing() {
  // Any HTTP response (even 401) = server is reachable

  const el = document.getElementById('sync-badge');
  if (!el) return;
  if (state === 'online')  { el.textContent = '● CLOUD'; el.className = 'sync-badge online'; el.title = 'Synced to cloud'; }
  if (state === 'offline') { el.textContent = '○ LOCAL'; el.className = 'sync-badge offline'; el.title = 'No cloud connection'; }
  if (state === 'syncing') { el.textContent = '◌ SYNC';  el.className = 'sync-badge offline'; el.title = 'Syncing...'; }
  if (state === 'error')   { el.textContent = '✕ SYNC';  el.className = 'sync-badge error';   el.title = msg || 'Sync error — check console'; el.onclick = () => alert('Sync error:\n' + (msg||'check console')); }
}

async function init() {
  // Always load localStorage first (instant)
  const saved = localStorage.getItem('liftlog_workouts');
  if (saved) { try { workouts = JSON.parse(saved); } catch(e) {} }

  // Then try to sync from Supabase
  const reachable = await dbPing();
  if (!reachable) {
    console.warn('Supabase unreachable — CORS or network issue. If opening as file://, add "null" to Supabase allowed origins (Dashboard → Settings → API).');
    setSyncBadge('offline');
  } else {
    try {
      const rows = await dbLoad();
      if (rows && rows.length > 0) {
        const cloudWorkouts = rows.map(r => r.workout_data);
        const cloudDates = new Set(cloudWorkouts.map(w => w.date));
        const merged = [...cloudWorkouts, ...workouts.filter(w => !cloudDates.has(w.date))];
        workouts = merged;
        localStorage.setItem('liftlog_workouts', JSON.stringify(workouts));
        updateStreak();
        renderMuscleGrid();
        renderExercises();
      }
      setSyncBadge('online');
    } catch(e) {
      console.warn('Supabase sync failed:', e.message || e);
      setSyncBadge('error', e.message);
    }
  }

  const now = new Date();
  document.getElementById('header-date').textContent = now.toLocaleDateString('en-IN', {weekday:'short', month:'short', day:'numeric'});
  updateStreak();
  renderMuscleGrid();
  renderExercises();
}

async function save() {
  localStorage.setItem('liftlog_workouts', JSON.stringify(workouts));
  try {
    const rows = workouts.map(w => ({
      workout_date: w.date,
      workout_data: w,
      created_at: new Date().toISOString()
    }));
    await dbUpsert(rows);
    setSyncBadge('online');
  } catch(e) {
    console.error('Supabase save error:', e.message || e);
    setSyncBadge('error', e.message);
  }
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const idx = ['log','history','prs','stats'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'prs') renderPRs();
  if (name === 'stats') renderStats();
}

function updateStreak() {
  if (workouts.length === 0) return;
  const dates = [...new Set(workouts.map(w => w.date))].sort().reverse();
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  let streak = 0;
  let checkDate = (dates[0] === today || dates[0] === yesterday) ? new Date(dates[0]) : null;
  if (!checkDate) return;
  const datesSet = new Set(dates);
  while (true) {
    const ds = checkDate.toISOString().slice(0,10);
    if (datesSet.has(ds)) { streak++; checkDate.setDate(checkDate.getDate()-1); }
    else break;
  }
  if (streak >= 2) {
    const el = document.getElementById('streak-badge');
    el.textContent = `🔥 ${streak}d`;
    el.style.display = 'block';
  }
}

// ── TIME ──────────────────────────────────────────────────────────────────
function openTimeModal(target) {
  if (target === 'in' && inTime) return;
  if (target === 'out' && outTime) return;
  timeModalTarget = target;
  const isIn = target === 'in';
  document.getElementById('time-modal-title').textContent = isIn ? 'SET CHECK-IN TIME' : 'SET CHECK-OUT TIME';
  document.getElementById('time-modal').classList.remove('hidden');
  const now = new Date();
  const hhmm = now.toTimeString().slice(0,5);
  document.getElementById('time-modal-manual').value = hhmm;
  document.getElementById('time-modal-clock').textContent = hhmm;
  clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    if (!document.getElementById('time-modal-manual').value) {
      document.getElementById('time-modal-clock').textContent = new Date().toTimeString().slice(0,5);
    }
  }, 1000);
}
function onManualTimeInput() {
  const val = document.getElementById('time-modal-manual').value;
  document.getElementById('time-modal-clock').textContent = val || new Date().toTimeString().slice(0,5);
  clearInterval(clockInterval);
}
function setCurrentTime() {
  const t = new Date().toTimeString().slice(0,5);
  document.getElementById('time-modal-manual').value = t;
  document.getElementById('time-modal-clock').textContent = t;
}
function confirmTime() {
  const val = document.getElementById('time-modal-manual').value || new Date().toTimeString().slice(0,5);
  closeTimeModal();
  if (timeModalTarget === 'in') {
    inTime = val;
    const el = document.getElementById('in-time-display');
    el.textContent = val; el.classList.remove('empty');
    document.getElementById('in-time-block').classList.add('has-time');
    const btn = document.getElementById('in-time-btn');
    btn.textContent = 'Set ✓'; btn.classList.add('set'); btn.onclick = null;
  } else {
    outTime = val;
    const el = document.getElementById('out-time-display');
    el.textContent = val; el.classList.remove('empty');
    document.getElementById('out-time-block').classList.add('has-time');
    const btn = document.getElementById('out-time-btn');
    btn.textContent = 'Set ✓'; btn.classList.add('set'); btn.onclick = null;
  }
  updateDurationBadge();
}
function closeTimeModal() {
  clearInterval(clockInterval);
  document.getElementById('time-modal').classList.add('hidden');
}
function updateDurationBadge() {
  const badge = document.getElementById('duration-badge');
  if (inTime && outTime) {
    const [ih,im] = inTime.split(':').map(Number);
    const [oh,om] = outTime.split(':').map(Number);
    const diff = Math.max(0, (oh*60+om) - (ih*60+im));
    document.getElementById('duration-text').textContent = diff + ' min';
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
}

// ── MUSCLE SELECTION ──────────────────────────────────────────────────────
function renderMuscleGrid() {
  const g = document.getElementById('muscle-grid');
  g.innerHTML = MUSCLES.map(m =>
    `<button class="muscle-chip${selectedMuscles.includes(m)?' selected':''}" data-m="${m}" onclick="toggleMuscle('${m}')">${m}</button>`
  ).join('');
}

function toggleMuscle(m) {
  if (selectedMuscles.includes(m)) {
    selectedMuscles = selectedMuscles.filter(x => x !== m);
  } else {
    selectedMuscles.push(m);
  }
  renderMuscleGrid();
  checkLastWorkoutBanner();
  // If exercises already loaded, re-assign muscles + re-render
  if (currentExercises.length > 0) {
    assignMusclesToExercises();
    renderExercises();
  }
}

function checkLastWorkoutBanner() {
  const banner = document.getElementById('last-workout-banner');
  if (selectedMuscles.length === 0) { banner.style.display = 'none'; return; }
  const matching = workouts.filter(w => w.muscles.some(m => selectedMuscles.includes(m)));
  if (matching.length === 0) { banner.style.display = 'none'; return; }
  const last = matching[0];
  banner.style.display = 'block';
  banner.innerHTML = `
    <div class="last-workout-banner">
      <div class="lwb-header">
        <div class="lwb-title">⚡ Last ${selectedMuscles.join('+')} session</div>
        <div class="lwb-date">${formatDateShort(last.date)}</div>
      </div>
      <div class="lwb-exercises">
        ${last.exercises.map(e => `<div class="lwb-ex-pill">${e.name}</div>`).join('')}
      </div>
      <button class="load-last-btn" onclick="loadLastWorkout(${last.id})">Load last session →</button>
    </div>`;
}

function loadLastWorkout(id) {
  const last = workouts.find(w => w.id === id);
  if (!last) return;
  currentExercises = last.exercises.map(ex => ({
    name: ex.name,
    muscle: ex.muscle || inferMuscleForExercise(ex.name),
    loaded: true,
    sets: ex.sets.map(s => ({kg: s.kg, reps: s.reps}))
  }));
  assignMusclesToExercises();
  renderExercises();
  document.getElementById('last-workout-banner').style.display = 'none';
  document.getElementById('exercise-list').scrollIntoView({behavior:'smooth', block:'start'});
}

// ── SMART SWAP: only show true alternatives for the target exercise ─────────
// Returns alternatives from: (1) user's actual history for same muscle, (2) canonical list
function getSwapAlternatives(exName, exMuscle) {
  const targetMuscle = exMuscle || inferMuscleForExercise(exName) || null;
  const results = { fromHistory: [], fromLibrary: [] };
  const seen = new Set([exName.toLowerCase()]);

  if (targetMuscle) {
    // From user's saved workout history — same muscle group exercises only
    const historyAlts = {};
    workouts.forEach(w => {
      w.exercises.forEach(e => {
        const eMuscle = e.muscle || inferMuscleForExercise(e.name);
        if (eMuscle === targetMuscle && e.name.toLowerCase() !== exName.toLowerCase()) {
          if (!historyAlts[e.name]) historyAlts[e.name] = { name: e.name, sessions: [] };
          historyAlts[e.name].sessions.push({ date: w.date, sets: e.sets });
        }
      });
    });
    results.fromHistory = Object.values(historyAlts).sort((a,b) => b.sessions.length - a.sessions.length);
    results.fromHistory.forEach(a => seen.add(a.name.toLowerCase()));

    // From canonical library — same muscle group
    const libAlts = (EXERCISE_ALTERNATIVES[targetMuscle] || []).filter(n => !seen.has(n.toLowerCase()));
    results.fromLibrary = libAlts.map(name => ({ name, sessions: [] }));
  }

  return { targetMuscle, ...results };
}

// ── EXERCISES ──────────────────────────────────────────────────────────────
function renderExercises() {
  assignMusclesToExercises();
  const list = document.getElementById('exercise-list');
  if (currentExercises.length === 0) { list.innerHTML = ''; return; }

  list.innerHTML = currentExercises.map((ex, ei) => {
    const muscle = ex.muscle || null;
    const muscleTag = muscle ? `<span class="ex-muscle-tag ${muscle}">${muscle.toUpperCase()}</span>` : '';
    const loadedBadge = ex.loaded ? '<span class="loaded-badge">LOADED</span>' : '';

    // Check if this exercise has alternatives (for swap button visibility)
    const hasAlts = muscle !== null;

    // Check for PR possibility
    const prLabel = getPRIndicator(ex);

    return `
    <div class="ex-card" id="ex-card-${ei}">
      <div class="ex-header">
        <div class="ex-header-left">
          <span class="ex-name">${ex.name}</span>
          ${muscleTag}
          ${loadedBadge}
          ${prLabel}
        </div>
        <div class="ex-header-right">
          ${hasAlts ? `<button class="inline-swap-btn" onclick="openSwapModal(${ei},'${escapeAttr(ex.name)}')">⇄ SWAP</button>` : ''}
          <button class="del-btn" onclick="removeExercise(${ei})">✕</button>
        </div>
      </div>
      <table class="sets-table">
        <tr>
          <th style="width:22px">#</th>
          <th>KG</th>
          <th>REPS</th>
          <th style="width:38px;text-align:center">VOL</th>
          <th style="width:20px"></th>
        </tr>
        ${ex.sets.map((s,si) => {
          const vol = s.kg && s.reps ? Math.round((parseFloat(s.weight) || 0) * (s.reps || 0)) : '';
          const isPR = checkIfPRSet(ex.name, s.kg, s.reps);
          return `<tr${isPR?' style="background:rgba(255,224,51,0.04)"':''}>
            <td style="color:var(--text3);font-size:10px;padding:3px 6px">${si+1}</td>
            <td><input type="number" value="${s.kg||''}" placeholder="0" min="0" step="0.5" oninput="updateSet(${ei},${si},'kg',this.value)"></td>
            <td><input type="number" value="${s.reps||''}" placeholder="0" min="0" oninput="updateSet(${ei},${si},'reps',this.value)"></td>
            <td class="set-vol">${vol ? vol+'kg' : '—'}</td>
            <td><button class="del-btn" style="font-size:11px" onclick="removeSet(${ei},${si})">✕</button></td>
          </tr>`;
        }).join('')}
      </table>
      <button class="add-set-btn" onclick="addSet(${ei})">+ add set</button>
    </div>`;
  }).join('');
}

function getPRIndicator(ex) {
  if (!ex.loaded || workouts.length === 0) return '';
  // Find best historical kg for this exercise (excluding current session)
  let maxKg = 0;
  workouts.forEach(w => {
    w.exercises.filter(e => e.name === ex.name).forEach(e => {
      e.sets.forEach(s => { if (s.kg > maxKg) maxKg = s.kg; });
    });
  });
  if (maxKg === 0) return '';
  const currentMax = Math.max(...ex.sets.filter(s => s.kg).map(s => s.kg || 0), 0);
  if (currentMax >= maxKg) return '<span class="pr-indicator">🏆 PR?</span>';
  return '';
}

function checkIfPRSet(exName, kg, reps) {
  if (!kg || !reps) return false;
  let maxKg = 0;
  workouts.forEach(w => {
    w.exercises.filter(e => e.name === exName).forEach(e => {
      e.sets.forEach(s => { if (s.kg > maxKg) maxKg = s.kg; });
    });
  });
  return maxKg > 0 && kg > maxKg;
}

function addExercise() {
  const inp = document.getElementById('new-ex-name');
  const name = inp.value.trim();
  if (!name) return;
  const muscle = inferMuscleForExercise(name) || (selectedMuscles.length === 1 ? selectedMuscles[0] : null);
  currentExercises.push({ name, muscle, sets: [{kg:'',reps:''}] });
  inp.value = '';
  renderExercises();
}

function removeExercise(i) { currentExercises.splice(i,1); renderExercises(); }
function addSet(ei) { currentExercises[ei].sets.push({kg:'',reps:''}); renderExercises(); }
function removeSet(ei, si) { if (currentExercises[ei].sets.length > 1) { currentExercises[ei].sets.splice(si,1); renderExercises(); } }
function updateSet(ei, si, field, val) {
  currentExercises[ei].sets[si][field] = parseFloat(val) || 0;

  // Surgically update just the vol cell + PR row highlight — never re-render (would kill focus)
  const card = document.getElementById(`ex-card-${ei}`);
  if (!card) return;

  const s = currentExercises[ei].sets[si];
  const vol = s.kg && s.reps ? Math.round((parseFloat(s.weight) || 0) * (s.reps || 0)) : '';

  // table rows: row 0 = header, rows 1+ = set data
  const rows = card.querySelectorAll('table tr');
  const dataRow = rows[si + 1];
  if (dataRow) {
    const volCell = dataRow.querySelector('.set-vol');
    if (volCell) volCell.textContent = vol ? vol + 'kg' : '—';
    const isPR = checkIfPRSet(currentExercises[ei].name, s.kg, s.reps);
    dataRow.style.background = isPR ? 'rgba(255,224,51,0.04)' : '';
  }

  // Update PR badge in card header without re-rendering
  const existingPR = card.querySelector('.pr-indicator');
  const newPRLabel = getPRIndicator(currentExercises[ei]);
  if (newPRLabel && !existingPR) {
    const headerLeft = card.querySelector('.ex-header-left');
    if (headerLeft) {
      const tmp = document.createElement('div');
      tmp.innerHTML = newPRLabel;
      headerLeft.appendChild(tmp.firstElementChild);
    }
  } else if (!newPRLabel && existingPR) {
    existingPR.remove();
  }
}

// ── SWAP MODAL ─────────────────────────────────────────────────────────────
function openSwapModal(exIndex, exName) {
  swapModalForExercise = { exIndex, exName };
  const ex = currentExercises[exIndex];
  const exMuscle = ex ? ex.muscle : null;
  const { targetMuscle, fromHistory, fromLibrary } = getSwapAlternatives(exName, exMuscle);

  const muscleLabel = targetMuscle ? `<span class="ex-muscle-tag ${targetMuscle}" style="vertical-align:middle">${targetMuscle}</span>` : '';
  document.getElementById('swap-modal-sub').innerHTML = `Swapping: <strong style="color:var(--text)">${exName}</strong> ${muscleLabel}`;

  const list = document.getElementById('swap-modal-list');
  let html = '';

  if (fromHistory.length > 0) {
    html += `<div class="swap-section-hdr">From your workout history</div>`;
    html += fromHistory.slice(0, 8).map(alt => {
      const lastSession = alt.sessions[alt.sessions.length - 1];
      const setsSummary = lastSession.sets.slice(0,3).map(s => `${s.kg}kg×${s.reps}`).join(', ');
      const lastDate = formatDateShort(lastSession.date);
      const setsData = JSON.stringify(lastSession.sets);
      return `
        <div class="swap-modal-ex" onclick="confirmSwap('${escapeAttr(alt.name)}', ${escapeJson(setsData)})">
          <div class="swap-modal-ex-name">
            ${alt.name}
            <span class="swap-why trained">TRAINED ${alt.sessions.length}×</span>
          </div>
          <div class="swap-modal-ex-stats">Last: ${setsSummary}</div>
          <div class="swap-modal-ex-date">On ${lastDate}</div>
        </div>`;
    }).join('');
  }

  if (fromLibrary.length > 0) {
    html += `<div class="swap-section-hdr">Alternative exercises — ${targetMuscle || 'similar'}</div>`;
    html += fromLibrary.slice(0, 6).map(alt => `
      <div class="swap-modal-ex" onclick="confirmSwap('${escapeAttr(alt.name)}', null)">
        <div class="swap-modal-ex-name">
          ${alt.name}
          <span class="swap-why variant">NEW</span>
        </div>
        <div class="swap-modal-ex-stats" style="color:var(--text3)">No history yet — try something fresh</div>
      </div>`).join('');
  }

  if (!html) html = `<div class="empty-state" style="padding:20px"><div>No alternatives found.<br>Add more workout history!</div></div>`;

  list.innerHTML = html;
  document.getElementById('swap-modal').classList.remove('hidden');
}

function escapeJson(str) {
  // For inline onclick, escape for single-quoted attr
  return "'" + str.replace(/'/g, "\\'").replace(/"/g,'&quot;') + "'";
}

function confirmSwap(newName, setsJSON) {
  if (swapModalForExercise === null) return;
  const { exIndex } = swapModalForExercise;
  let sets;
  try {
    const raw = typeof setsJSON === 'string' ? setsJSON.replace(/&quot;/g,'"') : null;
    sets = raw ? JSON.parse(raw) : [{kg:'',reps:''}];
  } catch(e) { sets = [{kg:'',reps:''}]; }

  const muscle = inferMuscleForExercise(newName) || currentExercises[exIndex]?.muscle || null;
  currentExercises[exIndex] = { name: newName, muscle, loaded: sets[0]?.kg ? true : false, sets: sets.map(s => ({...s})) };
  closeSwapModal();
  renderExercises();
}

function closeSwapModal() {
  document.getElementById('swap-modal').classList.add('hidden');
  swapModalForExercise = null;
}

function escapeAttr(str) {
  return str.replace(/\\/g,'\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── SAVE / CLEAR ──────────────────────────────────────────────────────────
function saveWorkout() {
  if (!inTime) { alert('Set your check-in time first'); return; }
  if (selectedMuscles.length === 0) { alert('Select at least one muscle group'); return; }
  if (currentExercises.length === 0) { alert('Add at least one exercise'); return; }

  const now = new Date();
  const finalOut = outTime || now.toTimeString().slice(0,5);
  const [ih,im] = inTime.split(':').map(Number);
  const [oh,om] = finalOut.split(':').map(Number);
  const duration = Math.max(0, (oh*60+om)-(ih*60+im));
  const warmup = parseInt(document.getElementById('warmup-min').value)||0;
  const notes = document.getElementById('session-notes').value;

  const workout = {
    id: Date.now(),
    date: now.toISOString().slice(0,10),
    inTime, outTime: finalOut, duration, warmup,
    muscles: [...selectedMuscles],
    exercises: currentExercises.map(ex => ({
      name: ex.name,
      muscle: ex.muscle || inferMuscleForExercise(ex.name) || null,
      sets: ex.sets.map(s => ({...s}))
    })),
    notes
  };

  workouts.unshift(workout);
  save();
  clearLog();
  showPage('history');
  updateStreak();
}

function clearLog() {
  currentExercises = []; selectedMuscles = [];
  inTime = null; outTime = null;
  document.getElementById('warmup-min').value = '';
  document.getElementById('session-notes').value = '';
  ['in','out'].forEach(t => {
    const el = document.getElementById(t+'-time-display');
    el.textContent = '--:--'; el.classList.add('empty');
    document.getElementById(t+'-time-block').classList.remove('has-time');
    const btn = document.getElementById(t+'-time-btn');
    btn.textContent = 'Tap to set'; btn.classList.remove('set');
    btn.onclick = () => openTimeModal(t);
  });
  document.getElementById('duration-badge').style.display = 'none';
  document.getElementById('last-workout-banner').style.display = 'none';
  renderMuscleGrid();
  renderExercises();
}

// ── HISTORY ──────────────────────────────────────────────────────────────
function renderHistory() {
  if (viewingWorkout) { renderWorkoutDetail(viewingWorkout); return; }

  const allMuscles = [...new Set(workouts.flatMap(w => w.muscles))];
  document.getElementById('history-filters').innerHTML = ['all', ...allMuscles].map(m =>
    `<button class="filter-chip${historyFilter===m?' active':''}" onclick="setHistoryFilter('${m}')">${m.toUpperCase()}</button>`
  ).join('');

  const filtered = historyFilter === 'all' ? workouts : workouts.filter(w => w.muscles.includes(historyFilter));
  const list = document.getElementById('history-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">💪</div>No workouts yet.<br>Start logging!</div>`;
    return;
  }

  // Group by month
  const grouped = {};
  filtered.forEach(w => {
    const mon = w.date.slice(0,7);
    if (!grouped[mon]) grouped[mon] = [];
    grouped[mon].push(w);
  });

  list.innerHTML = Object.entries(grouped).sort((a,b) => b[0].localeCompare(a[0])).map(([mon, ws]) => {
    const label = new Date(mon+'-15').toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    return `
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">${label} <span style="color:var(--text3);font-weight:400">(${ws.length})</span></div>
      ${ws.map(w => {
        const totalSets = w.exercises.reduce((a, e) => {
            return a + (e.sets?.length ?? 0);}, 0);

        const totalVol = w.exercises.reduce((a, e) => {
          if (!e.sets) return a;
          return a + e.sets.reduce((b, s) => {
            const w = parseFloat(s.weight);
            if (isNaN(w) || !s.reps) return b;
            return b + (w * s.reps);
            }, 0);
          }, 0);
        return `<div class="workout-item" onclick="viewWorkout(${w.id})">
          <div class="workout-item-header">
            <div class="workout-date">${formatDate(w.date)}</div>
            <div class="workout-duration">${w.duration}min</div>
          </div>
          <div class="workout-muscles">${w.muscles.map(m=>`<span class="muscle-tag ${m}">${m.toUpperCase()}</span>`).join('')}</div>
          <div class="workout-stats">
            <div class="stat-mini"><span>${w.exercises.length}</span> exercises</div>
            <div class="stat-mini"><span>${totalSets}</span> sets</div>
            <div class="stat-mini"><span>${Math.round(totalVol).toLocaleString()}</span> kg vol</div>
            ${w.inTime ? `<div class="stat-mini"><span>${w.inTime}–${w.outTime}</span></div>` : ''}
          </div>
        </div>`;
      }).join('')}`;
  }).join('');
}

function setHistoryFilter(f) { historyFilter = f; renderHistory(); }
function viewWorkout(id) { viewingWorkout = workouts.find(w => w.id === id); renderHistory(); }

function renderWorkoutDetail(w) {
  const totalVol = w.exercises.reduce((a,e) => a+e.sets.reduce((b,s) => b+(s.kg*s.reps||0),0),0);
  document.getElementById('history-list').innerHTML = `
    <button class="back-btn" onclick="viewingWorkout=null;renderHistory()">← Back to History</button>
    <div style="margin-bottom:14px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text);margin-bottom:4px">${formatDate(w.date)}</div>
      <div style="font-size:11px;color:var(--text2)">${w.inTime} → ${w.outTime} · <span style="color:var(--accent);font-weight:700">${w.duration} min</span>${w.warmup?' · '+w.warmup+'min warmup':''}</div>
      <div class="workout-muscles" style="margin-top:8px">${w.muscles.map(m=>`<span class="muscle-tag ${m}">${m.toUpperCase()}</span>`).join('')}</div>
    </div>
    ${w.exercises.map(ex => {
      const musTag = (ex.muscle) ? `<span class="ex-muscle-tag ${ex.muscle}">${ex.muscle.toUpperCase()}</span>` : '';
      const bestSet = ex.sets.reduce((a,s) => (s.kg > a.kg ? s : a), {kg:0,reps:0});
      return `<div class="workout-detail">
        <div class="detail-ex-name">${ex.name} ${musTag}</div>
        ${ex.sets.map((s,i) => `<div class="detail-sets">Set ${i+1}: <span>${s.kg}kg × ${s.reps}</span> <span style="color:var(--text3);font-size:10px">(${Math.round(s.kg*s.reps)}kg)</span></div>`).join('')}
        <div style="font-size:10px;color:var(--text3);margin-top:6px">Best: ${bestSet.kg}kg×${bestSet.reps} · Vol: ${Math.round(ex.sets.reduce((a,s)=>a+(s.kg*s.reps||0),0))}kg</div>
      </div>`;
    }).join('')}
    ${w.notes ? `<div class="workout-detail" style="border-color:rgba(255,255,255,0.1)"><div style="font-size:9px;color:var(--text3);margin-bottom:4px;letter-spacing:2px">NOTES</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${w.notes}</div></div>` : ''}
    <div class="stat-grid" style="margin-top:12px">
      <div class="stat-card"><div class="stat-card-label">Total Volume</div><div class="stat-card-value">${Math.round(totalVol).toLocaleString()}</div><div class="stat-card-sub">kilograms</div></div>
      <div class="stat-card"><div class="stat-card-label">Total Sets</div><div class="stat-card-value">${w.exercises.reduce((a,e)=>a+(e.sets?.length ?? 0),0)}</div><div class="stat-card-sub">across ${w.exercises.length} exercises</div></div>
    </div>
    <button class="btn btn-danger" style="width:100%;padding:12px;margin-top:4px" onclick="deleteWorkout(${w.id})">DELETE WORKOUT</button>`;
  document.getElementById('history-filters').innerHTML = '';
}

async function deleteWorkout(id) {
  if (!confirm('Delete this workout?')) return;
  const target = workouts.find(w => w.id === id);
  workouts = workouts.filter(w => w.id !== id);
  save();
  if (target) {
    try { await dbDelete(target.date); }
    catch(e) { console.error('Supabase delete error:', e.message || e); }
  }
  viewingWorkout = null;
  renderHistory();
}

// ── PRs ────────────────────────────────────────────────────────────────────
function renderPRs() {
  const allExercises = [...new Set(workouts.flatMap(w => w.exercises.map(e => e.name)))].sort();
  const muscles = [...new Set(workouts.flatMap(w => w.muscles))];
  document.getElementById('pr-filters').innerHTML = ['all', ...muscles].map(m =>
    `<button class="filter-chip${prFilter===m?' active':''}" onclick="setPRFilter('${m}')">${m.toUpperCase()}</button>`
  ).join('');

  const list = document.getElementById('pr-list');
  if (allExercises.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div>Log workouts to see PRs!</div>`;
    return;
  }

  const filteredWorkouts = prFilter === 'all' ? workouts : workouts.filter(w => w.muscles.includes(prFilter));
  const filteredExercises = [...new Set(filteredWorkouts.flatMap(w => w.exercises.map(e => e.name)))].sort();

  list.innerHTML = filteredExercises.map(exName => {
    let maxKg = 0, maxReps = 0, maxVol = 0;
    let maxKgDate = '', maxRepsDate = '', maxVolDate = '';
    let exMuscle = null;
    workouts.forEach(w => {
      w.exercises.filter(e => e.name === exName).forEach(ex => {
        if (!exMuscle) exMuscle = ex.muscle || inferMuscleForExercise(ex.name);
        ex.sets.forEach(s => {
          if (s.kg > maxKg) { maxKg = s.kg; maxKgDate = w.date; }
          if (s.reps > maxReps) { maxReps = s.reps; maxRepsDate = w.date; }
        });
        const vol = ex.sets.reduce((a,s) => a+(s.kg*s.reps||0),0);
        if (vol > maxVol) { maxVol = vol; maxVolDate = w.date; }
      });
    });
    if (maxKg === 0 && maxReps === 0) return '';
    const musTag = exMuscle ? `<span class="ex-muscle-tag ${exMuscle}" style="font-size:8px">${exMuscle.toUpperCase()}</span>` : '';
    return `<div class="pr-card">
      <div class="pr-ex-name">${exName} ${musTag}</div>
      <div class="pr-row"><span class="pr-label">Heaviest weight</span><span class="pr-val">${maxKg} kg <span class="pr-badge">${formatDateShort(maxKgDate)}</span></span></div>
      <div class="pr-row"><span class="pr-label">Most reps (single set)</span><span class="pr-val">${maxReps} reps <span class="pr-badge">${formatDateShort(maxRepsDate)}</span></span></div>
      <div class="pr-row"><span class="pr-label">Best session volume</span><span class="pr-val">${Math.round(maxVol).toLocaleString()} kg</span></div>
    </div>`;
  }).filter(Boolean).join('');
}
function setPRFilter(f) { prFilter = f; renderPRs(); }

// ── STATS ──────────────────────────────────────────────────────────────────
function renderStats() {
  const el = document.getElementById('stats-content');
  if (workouts.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div>Log workouts to see stats!</div>`;
    return;
  }

  const totalWorkouts = workouts.length;
  const totalVol = workouts.reduce((a,w) => a+w.exercises.reduce((b,e)=>b+e.sets.reduce((c,s)=>c+(s.kg*s.reps||0),0),0),0);
  const avgDur = Math.round(workouts.reduce((a,w)=>a+w.duration,0)/workouts.length);
  const totalSets = workouts.reduce((a,w)=>a+w.exercises.reduce((b,e)=>b+(e.sets?.length ?? 0),0),0);
  const last7 = workouts.filter(w => (new Date()-new Date(w.date))/(86400000) <= 7).length;
  const last30 = workouts.filter(w => (new Date()-new Date(w.date))/(86400000) <= 30).length;

  const muscleCounts = {};
  workouts.forEach(w => w.muscles.forEach(m => { muscleCounts[m] = (muscleCounts[m]||0)+1; }));
  const sortedMuscles = Object.entries(muscleCounts).sort((a,b) => b[1]-a[1]);
  const maxMC = Math.max(...Object.values(muscleCounts));

  const last10 = workouts.slice(0,10).reverse();
  const vols = last10.map(w => w.exercises.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(s.kg*s.reps||0),0),0));
  const maxVol = Math.max(...vols, 1);

  const MUSCLE_COLORS = {
    Chest:'var(--chest-c)',Back:'var(--back-c)',Shoulders:'var(--shoulders-c)',
    Biceps:'var(--biceps-c)',Triceps:'var(--triceps-c)',Legs:'var(--legs-c)',
    Abs:'var(--abs-c)',Cardio:'var(--cardio-c)'
  };

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-card-label">Total Sessions</div><div class="stat-card-value">${totalWorkouts}</div><div class="stat-card-sub">${last7} this week · ${last30} this month</div></div>
      <div class="stat-card"><div class="stat-card-label">Avg Duration</div><div class="stat-card-value">${avgDur}</div><div class="stat-card-sub">minutes / session</div></div>
      <div class="stat-card"><div class="stat-card-label">Total Volume</div><div class="stat-card-value">${(totalVol/1000).toFixed(1)}t</div><div class="stat-card-sub">${Math.round(totalVol).toLocaleString()} kg lifted</div></div>
      <div class="stat-card"><div class="stat-card-label">Total Sets</div><div class="stat-card-value">${totalSets}</div><div class="stat-card-sub">across ${totalWorkouts} sessions</div></div>
    </div>

    <div class="chart-container">
      <div class="chart-title">Volume — last ${last10.length} sessions</div>
      <div class="bar-chart">
        ${last10.map((w,i) => {
          const muscleColor = w.muscles[0] ? (MUSCLE_COLORS[w.muscles[0]] || 'var(--accent)') : 'var(--accent)';
          return `<div class="bar-wrap">
            <div class="bar" style="height:${Math.round((vols[i]/maxVol)*74)+2}px;background:${i===last10.length-1?'var(--accent)':muscleColor};opacity:${i===last10.length-1?1:0.45}"></div>
            <div class="bar-label">${w.date.slice(5)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-title">Muscle group frequency</div>
      ${sortedMuscles.slice(0,8).map(([m,c]) => `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:${MUSCLE_COLORS[m]||'var(--text2)'};width:80px;text-align:right;letter-spacing:1px;text-transform:uppercase">${m}</div>
          <div style="flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden">
            <div style="width:${Math.round((c/maxMC)*100)}%;height:100%;background:${MUSCLE_COLORS[m]||'var(--accent)'};border-radius:4px;opacity:${0.4+0.6*(c/maxMC)}"></div>
          </div>
          <div style="font-size:10px;color:var(--text2);width:24px;text-align:right">${c}x</div>
        </div>`).join('')}
    </div>

    <div class="chart-container">
      <div class="chart-title">Session duration trend</div>
      <div class="bar-chart">
        ${last10.map((w,i) => {
          const maxDur = Math.max(...last10.map(x=>x.duration),1);
          return `<div class="bar-wrap">
            <div class="bar" style="height:${Math.round((w.duration/maxDur)*74)+2}px;background:rgba(68,136,255,${i===last10.length-1?'0.9':'0.4'})"></div>
            <div class="bar-label">${w.date.slice(5)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function formatDate(d) {
  return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function formatDateShort(d) {
  if (!d) return '';
  return new Date(d+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

// Close modals on backdrop tap
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.add('hidden');
    }
  });
});

init();
</script>
</body>
</html>
